<svg xmlns="http://www.w3.org/2000/svg" width="1344" height="768" viewBox="0 0 1344 768">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08081a"/>
      <stop offset="100%" stop-color="#0e0e22"/>
    </linearGradient>
    <radialGradient id="glow" cx="55%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#D4A843" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#D4A843" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1344" height="768" fill="url(#bg)"/>
  <ellipse cx="780" cy="384" rx="320" ry="250" fill="url(#glow)"/>

  <!-- Network graph — 4 connected "ally" nodes around a center player -->

  <!-- Connection lines (drawn first, behind nodes) -->
  <!-- Center to allies -->
  <line x1="780" y1="384" x2="620" y2="260" stroke="#D4A843" stroke-width="2" opacity="0.25"/>
  <line x1="780" y1="384" x2="940" y2="260" stroke="#66bb6a" stroke-width="2.5" opacity="0.4"/>
  <line x1="780" y1="384" x2="620" y2="510" stroke="#ef5350" stroke-width="2" opacity="0.3"/>
  <line x1="780" y1="384" x2="940" y2="510" stroke="#D4A843" stroke-width="2" opacity="0.15"/>

  <!-- Cross-connections (ally to ally, fainter) -->
  <line x1="620" y1="260" x2="940" y2="260" stroke="#D4A843" stroke-width="1" opacity="0.06"/>
  <line x1="620" y1="510" x2="940" y2="510" stroke="#D4A843" stroke-width="1" opacity="0.06"/>
  <line x1="620" y1="260" x2="620" y2="510" stroke="#D4A843" stroke-width="1" opacity="0.04"/>
  <line x1="940" y1="260" x2="940" y2="510" stroke="#D4A843" stroke-width="1" opacity="0.04"/>

  <!-- Center node (you) -->
  <circle cx="780" cy="384" r="28" fill="none" stroke="#D4A843" stroke-width="2.5"/>
  <circle cx="780" cy="384" r="8" fill="#D4A843"/>

  <!-- Ally 1 — top left (neutral) -->
  <circle cx="620" cy="260" r="18" fill="none" stroke="#D4A843" stroke-width="1.5" opacity="0.6"/>
  <circle cx="620" cy="260" r="5" fill="#D4A843" opacity="0.6"/>
  <text x="620" y="230" fill="#D4A843" font-family="monospace" font-size="12" opacity="0.35" text-anchor="middle">+12</text>

  <!-- Ally 2 — top right (strong positive) -->
  <circle cx="940" cy="260" r="22" fill="none" stroke="#66bb6a" stroke-width="2" opacity="0.7"/>
  <circle cx="940" cy="260" r="6" fill="#66bb6a" opacity="0.7"/>
  <text x="940" y="226" fill="#66bb6a" font-family="monospace" font-size="14" opacity="0.5" text-anchor="middle">+47</text>

  <!-- Ally 3 — bottom left (negative) -->
  <circle cx="620" cy="510" r="20" fill="none" stroke="#ef5350" stroke-width="1.8" opacity="0.6"/>
  <circle cx="620" cy="510" r="5.5" fill="#ef5350" opacity="0.6"/>
  <text x="620" y="544" fill="#ef5350" font-family="monospace" font-size="13" opacity="0.4" text-anchor="middle">-31</text>

  <!-- Ally 4 — bottom right (slight positive) -->
  <circle cx="940" cy="510" r="15" fill="none" stroke="#D4A843" stroke-width="1.2" opacity="0.4"/>
  <circle cx="940" cy="510" r="4" fill="#D4A843" opacity="0.4"/>
  <text x="940" y="538" fill="#D4A843" font-family="monospace" font-size="11" opacity="0.25" text-anchor="middle">+3</text>
</svg>
