<svg xmlns="http://www.w3.org/2000/svg" width="1344" height="768" viewBox="0 0 1344 768">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08081a"/>
      <stop offset="100%" stop-color="#0e0e22"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#D4A843" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#D4A843" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1344" height="768" fill="url(#bg)"/>
  <ellipse cx="800" cy="384" rx="340" ry="260" fill="url(#glow)"/>

  <!-- Waveform pattern — behavioral signature visualization -->
  <!-- Player A waveform (gold) -->
  <polyline points="520,320 560,290 600,340 640,280 680,350 720,300 760,310 800,260 840,330 880,270 920,340 960,290 1000,320 1040,280 1080,310"
    fill="none" stroke="#D4A843" stroke-width="2.5" opacity="0.8"/>
  <!-- Player A dots at peaks -->
  <circle cx="640" cy="280" r="4" fill="#D4A843" opacity="0.9"/>
  <circle cx="800" cy="260" r="4" fill="#D4A843" opacity="0.9"/>
  <circle cx="880" cy="270" r="4" fill="#D4A843" opacity="0.9"/>
  <circle cx="1040" cy="280" r="4" fill="#D4A843" opacity="0.9"/>

  <!-- Player B waveform (dim gold) — similar shape, same person? -->
  <polyline points="520,470 560,440 600,490 640,430 680,500 720,450 760,460 800,410 840,480 880,420 920,490 960,440 1000,470 1040,430 1080,460"
    fill="none" stroke="#D4A843" stroke-width="2.5" opacity="0.35"/>
  <circle cx="640" cy="430" r="4" fill="#D4A843" opacity="0.4"/>
  <circle cx="800" cy="410" r="4" fill="#D4A843" opacity="0.4"/>
  <circle cx="880" cy="420" r="4" fill="#D4A843" opacity="0.4"/>
  <circle cx="1040" cy="430" r="4" fill="#D4A843" opacity="0.4"/>

  <!-- Connecting lines — matching peaks -->
  <line x1="640" y1="284" x2="640" y2="426" stroke="#D4A843" stroke-width="1" opacity="0.08" stroke-dasharray="4,6"/>
  <line x1="800" y1="264" x2="800" y2="406" stroke="#D4A843" stroke-width="1" opacity="0.08" stroke-dasharray="4,6"/>
  <line x1="880" y1="274" x2="880" y2="416" stroke="#D4A843" stroke-width="1" opacity="0.08" stroke-dasharray="4,6"/>
  <line x1="1040" y1="284" x2="1040" y2="426" stroke="#D4A843" stroke-width="1" opacity="0.08" stroke-dasharray="4,6"/>

  <!-- "=" symbol between waveforms -->
  <line x1="780" y1="375" x2="820" y2="375" stroke="#D4A843" stroke-width="2" opacity="0.25"/>
  <line x1="780" y1="385" x2="820" y2="385" stroke="#D4A843" stroke-width="2" opacity="0.25"/>
  <text x="830" y="384" fill="#D4A843" font-family="monospace" font-size="22" opacity="0.3">?</text>
</svg>
