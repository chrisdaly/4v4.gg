<svg xmlns="http://www.w3.org/2000/svg" width="1344" height="768" viewBox="0 0 1344 768">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08081a"/>
      <stop offset="100%" stop-color="#0e0e22"/>
    </linearGradient>
    <radialGradient id="glow" cx="55%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#D4A843" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#D4A843" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1344" height="768" fill="url(#bg)"/>
  <ellipse cx="740" cy="384" rx="380" ry="280" fill="url(#glow)"/>

  <!-- 4x4 grid of race squares — the meta grid -->
  <!-- Row labels (left axis): H O N U -->
  <text x="510" y="244" fill="#D4A843" font-family="monospace" font-size="18" opacity="0.5" text-anchor="end">H</text>
  <text x="510" y="344" fill="#D4A843" font-family="monospace" font-size="18" opacity="0.5" text-anchor="end">O</text>
  <text x="510" y="444" fill="#D4A843" font-family="monospace" font-size="18" opacity="0.5" text-anchor="end">N</text>
  <text x="510" y="544" fill="#D4A843" font-family="monospace" font-size="18" opacity="0.5" text-anchor="end">U</text>

  <!-- Column labels (top): H O N U -->
  <text x="580" y="180" fill="#D4A843" font-family="monospace" font-size="18" opacity="0.5" text-anchor="middle">H</text>
  <text x="680" y="180" fill="#D4A843" font-family="monospace" font-size="18" opacity="0.5" text-anchor="middle">O</text>
  <text x="780" y="180" fill="#D4A843" font-family="monospace" font-size="18" opacity="0.5" text-anchor="middle">N</text>
  <text x="880" y="180" fill="#D4A843" font-family="monospace" font-size="18" opacity="0.5" text-anchor="middle">U</text>

  <!-- Heatmap cells — varying gold opacity for win rates -->
  <!-- Row 1: Human vs... -->
  <rect x="540" y="210" width="80" height="60" rx="4" fill="#D4A843" opacity="0.35"/>
  <rect x="640" y="210" width="80" height="60" rx="4" fill="#D4A843" opacity="0.18"/>
  <rect x="740" y="210" width="80" height="60" rx="4" fill="#66bb6a" opacity="0.28"/>
  <rect x="840" y="210" width="80" height="60" rx="4" fill="#D4A843" opacity="0.22"/>

  <!-- Row 2: Orc vs... -->
  <rect x="540" y="310" width="80" height="60" rx="4" fill="#D4A843" opacity="0.20"/>
  <rect x="640" y="310" width="80" height="60" rx="4" fill="#D4A843" opacity="0.30"/>
  <rect x="740" y="310" width="80" height="60" rx="4" fill="#ef5350" opacity="0.22"/>
  <rect x="840" y="310" width="80" height="60" rx="4" fill="#66bb6a" opacity="0.32"/>

  <!-- Row 3: NE vs... -->
  <rect x="540" y="410" width="80" height="60" rx="4" fill="#66bb6a" opacity="0.30"/>
  <rect x="640" y="410" width="80" height="60" rx="4" fill="#ef5350" opacity="0.18"/>
  <rect x="740" y="410" width="80" height="60" rx="4" fill="#D4A843" opacity="0.25"/>
  <rect x="840" y="410" width="80" height="60" rx="4" fill="#D4A843" opacity="0.15"/>

  <!-- Row 4: Undead vs... -->
  <rect x="540" y="510" width="80" height="60" rx="4" fill="#ef5350" opacity="0.20"/>
  <rect x="640" y="510" width="80" height="60" rx="4" fill="#66bb6a" opacity="0.35"/>
  <rect x="740" y="510" width="80" height="60" rx="4" fill="#D4A843" opacity="0.20"/>
  <rect x="840" y="510" width="80" height="60" rx="4" fill="#D4A843" opacity="0.28"/>

  <!-- Percentage labels inside cells -->
  <text x="580" y="248" fill="#fff" font-family="monospace" font-size="14" opacity="0.6" text-anchor="middle">52%</text>
  <text x="780" y="248" fill="#fff" font-family="monospace" font-size="14" opacity="0.6" text-anchor="middle">57%</text>
  <text x="880" y="348" fill="#fff" font-family="monospace" font-size="14" opacity="0.6" text-anchor="middle">58%</text>
  <text x="580" y="448" fill="#fff" font-family="monospace" font-size="14" opacity="0.6" text-anchor="middle">56%</text>
  <text x="680" y="548" fill="#fff" font-family="monospace" font-size="14" opacity="0.6" text-anchor="middle">59%</text>
</svg>
