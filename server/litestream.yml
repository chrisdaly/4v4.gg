# Litestream continuous SQLite replication to Tigris (Fly object storage).
# Active only when BUCKET_NAME is set (see docker-entrypoint.sh).
#
# Provisioning (sets BUCKET_NAME + AWS_* secrets on the app automatically):
#   fly storage create -a 4v4gg-chat-relay -n 4v4gg-chat-db
#
# Restore (after data loss):
#   litestream restore -config /etc/litestream.yml -o /data/chat.db /data/chat.db
dbs:
  - path: /data/chat.db
    replicas:
      - type: s3
        bucket: ${BUCKET_NAME}
        path: chat-db
        endpoint: ${AWS_ENDPOINT_URL_S3}
        region: ${AWS_REGION}
        access-key-id: ${AWS_ACCESS_KEY_ID}
        secret-access-key: ${AWS_SECRET_ACCESS_KEY}
        sync-interval: 10s
