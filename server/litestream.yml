# Litestream continuous SQLite replication.
# Active only when LITESTREAM_REPLICA_URL is set (see docker-entrypoint.sh).
#
# Required Fly secrets:
#   fly secrets set -a 4v4gg-chat-relay \
#     LITESTREAM_REPLICA_URL=s3://<bucket>/chat-db \
#     LITESTREAM_ACCESS_KEY_ID=<key> \
#     LITESTREAM_SECRET_ACCESS_KEY=<secret>
#
# For Cloudflare R2, also set the endpoint in the URL form:
#   LITESTREAM_REPLICA_URL=s3://<bucket>.<account-id>.r2.cloudflarestorage.com/chat-db
#
# Restore (after data loss):
#   litestream restore -config /etc/litestream.yml -o /data/chat.db /data/chat.db
dbs:
  - path: /data/chat.db
    replicas:
      - url: ${LITESTREAM_REPLICA_URL}
        sync-interval: 10s
